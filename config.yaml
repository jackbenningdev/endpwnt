base_url: "http://localhost:8888"

timeouts:
  request_seconds: 10

request_defaults:
  headers:
    User-Agent: "endpwnt/0.1.0"
    Accept: "application/json"

auth_contexts:
  - name: "unauth"

  - name: "user"
    headers:
      Authorization: "Bearer eyJ_user_token_here"

  - name: "admin"
    headers:
      Authorization: "Bearer eyJ_admin_token_here"

  - name: "session_user"
    cookies:
      sessionid: "abc123"

endpoint_sources:
  openapi: "openapi.yaml"
  include_paths: []
  exclude_paths:
    - "/health"
    - "/metrics"

checks:
  enabled:
    - "auth"
    - "bola"
    - "error_leak"
    - "method_exposure"
    - "token_lifecycle"

  # Options are flat because each check's run() reads directly
  # from the top-level options dict (e.g. options.get("candidate_param_names"))
  privileged_auth_names:
    - "user"
    - "admin"

  candidate_param_names:
    - "id"
    - "userId"
    - "accountId"
    - "orderId"

  test_values:
    - "1"
    - "2"
    - "9999"

reporting:
  format: "markdown"
  output: "report.md"
  include_request_headers: false
  include_response_headers: true
  max_body_chars: 500